name: Build AirPlay TV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Permite lanzarlo manualmente desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout del código ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # ── 2. Node.js 24 (evita warning de deprecación) ──────────────────────
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 4. Android SDK + NDK + CMake ──────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.1

      - name: Install NDK 25 and CMake
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "CMAKE_HOME=$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_ENV

      # ── 4. Clonar UxPlay (fuentes C++) ────────────────────────────────────
      - name: Clone UxPlay sources
        run: |
          git clone --depth=1 https://github.com/FDH2/UxPlay.git \
            app/src/main/cpp/uxplay
          echo "UxPlay cloned: $(git -C app/src/main/cpp/uxplay rev-parse --short HEAD)"

      # ── 5. GStreamer para Android (ARM64) ─────────────────────────────────
      # GStreamer proporciona el pipeline de audio/video necesario para UxPlay
      - name: Download GStreamer Android binaries
        run: |
          GSTREAMER_VERSION="1.24.0"
          wget -q \
            "https://gstreamer.freedesktop.org/data/pkg/android/${GSTREAMER_VERSION}/gstreamer-1.0-android-universal-${GSTREAMER_VERSION}.tar.xz" \
            -O gstreamer-android.tar.xz
          mkdir -p gstreamer-android
          tar -xf gstreamer-android.tar.xz -C gstreamer-android
          echo "GSTREAMER_ROOT_ANDROID=$(pwd)/gstreamer-android" >> $GITHUB_ENV

      # ── 6. Caché de Gradle ────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. Permisos de ejecución para Gradle wrapper ──────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 8. Compilar APK de debug ──────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -PGSTREAMER_ROOT_ANDROID=${{ env.GSTREAMER_ROOT_ANDROID }} \
            --stacktrace \
            --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}

      # ── 9. Renombrar APK para descarga fácil ──────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/AirPlayTV.apk
          echo "APK size: $(du -sh artifacts/AirPlayTV.apk)"

      # ── 10. Subir APK como artefacto descargable ──────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: AirPlayTV-APK
          path: artifacts/AirPlayTV.apk
          retention-days: 30

      # ── 11. Resumen en el log de GitHub ───────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ Build exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** AirPlayTV.apk" >> $GITHUB_STEP_SUMMARY
          echo "**Tamaño:** $(du -sh artifacts/AirPlayTV.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Descárgalo desde la pestaña **Actions → Artifacts**" >> $GITHUB_STEP_SUMMARY